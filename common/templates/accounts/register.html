{% load bootstrap4 %}
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" href="{% static 'icons/icon2.png' %}" sizes="32x32" type="image/png">
      {% bootstrap_css %}
      
      <style>
        body {
          background-color: #f3f4f6 !important;
        }
      </style>

      <title>Cadastre-se</title>

  </head>

  <body class="d-flex flex-column min-vh-100">

    <div class="container flex-grow-1 d-flex flex-column justify-content-center">

        <div class="row justify-content-center w-100 my-5">
            <div class="col-xl-6 col-lg-8 col-md-9">
                <div class="card o-hidden border-0 shadow-lg rounded-3">
                    <div class="card-body p-0">
                        <div class="p-5 bg-white">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-4">Registre-se!</h1>
                            </div>
                            <form method="post">
                              {% csrf_token %}
                              {% bootstrap_form form %}
                              <button type="submit" class="btn btn-block btn-primary mt-4">Cadastrar</button>
                            </form>
                            
                            <hr class="my-4">
                            <div class="text-center">
                                <a class="small text-decoration-none" href="{% url 'login' %}">Já tem uma conta? Faça login!</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto bg-white py-4 shadow-sm">
        <div class="container">
            <div class="text-muted text-center">Copyright &copy; {% now 'Y' %} MyFinance todos os direitos reservados.</div>
        </div>
    </footer>
    
    {% bootstrap_javascript jquery='full' %}
  </body>
</html>
